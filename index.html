<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지원이의 수학 노트</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  background: linear-gradient(135deg, #fdf2f8 0%, #ede9fe 50%, #dbeafe 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.container {
  max-width: 600px;
  width: 100%;
  text-align: center;
}
.hero {
  background: white;
  border-radius: 24px;
  padding: 50px 40px;
  box-shadow: 0 20px 60px rgba(102, 126, 234, 0.15);
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 6px;
  background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
}
.emoji-top {
  font-size: 3em;
  margin-bottom: 16px;
  animation: bounce 2s ease-in-out infinite;
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
h1 {
  font-size: 2em;
  background: linear-gradient(135deg, #667eea, #764ba2);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 12px;
}
.message {
  background: linear-gradient(135deg, #fef3c7, #fde68a);
  border-radius: 16px;
  padding: 20px 24px;
  margin: 24px 0;
  font-size: 1.1em;
  line-height: 1.8;
  color: #92400e;
  position: relative;
}
.message::before {
  content: '💌';
  position: absolute;
  top: -14px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 1.5em;
}
.cards {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-top: 32px;
}
.card {
  display: block;
  text-decoration: none;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 24px;
  border-radius: 16px;
  font-size: 1.15em;
  font-weight: 600;
  transition: all 0.3s ease;
  box-shadow: 0 6px 20px rgba(102, 126, 234, 0.3);
}
.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 30px rgba(102, 126, 234, 0.4);
}
.card:active {
  transform: translateY(-1px);
}
.card .card-icon {
  font-size: 1.8em;
  display: block;
  margin-bottom: 8px;
}
.card .card-desc {
  font-size: 0.85em;
  opacity: 0.85;
  font-weight: 400;
  margin-top: 4px;
}
.card:nth-child(2) {
  background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  box-shadow: 0 6px 20px rgba(240, 147, 251, 0.3);
}
.card:nth-child(2):hover {
  box-shadow: 0 12px 30px rgba(240, 147, 251, 0.4);
}
.footer {
  margin-top: 24px;
  font-size: 0.9em;
  color: #9ca3af;
}
.sparkle {
  display: inline-block;
  animation: sparkle 1.5s ease-in-out infinite;
}
.sparkle:nth-child(2) { animation-delay: 0.3s; }
.sparkle:nth-child(3) { animation-delay: 0.6s; }
@keyframes sparkle {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.3); }
}
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div class="emoji-top">📖✨</div>
    <h1>지원이의 수학 노트</h1>

    <div class="message">
      지원아, 넌 정말 잘하고 있어! 🌟<br>
      수학이 어려울 때도 있겠지만,<br>
      하나씩 차근차근 하면 분명 해낼 수 있어!<br>
      아빠가 항상 응원하고 있어 💪💖
    </div>

    <div class="cards">
      <a href="다항식_개념정리.html" class="card">
        <span class="card-icon">📐</span>
        다항식 개념정리
        <div class="card-desc">다항식의 연산부터 항등식·나머지정리까지</div>
      </a>
      <a href="방정식과_부등식_개념정리.html" class="card">
        <span class="card-icon">📊</span>
        방정식과 부등식 개념정리
        <div class="card-desc">복소수·이차방정식·연립방정식·부등식</div>
      </a>
    </div>

    <div class="footer">
      <span class="sparkle">✨</span>
      <span class="sparkle">✨</span>
      <span class="sparkle">✨</span>
      힘내라 지원아!
      <span class="sparkle">✨</span>
      <span class="sparkle">✨</span>
      <span class="sparkle">✨</span>
    </div>
  </div>
</div>
</body>
</html>
